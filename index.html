<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>宿題スキャナー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F3EE;
  --surface: #FDFCF9;
  --surface2: #F0EDE6;
  --ink: #1A1814;
  --ink2: #6B6760;
  --ink3: #A8A49E;
  --accent: #E8440A;
  --accent2: #FF6B35;
  --green: #2A7A4B;
  --green-bg: #E8F5EE;
  --border: rgba(26,24,20,0.1);
  --border2: rgba(26,24,20,0.18);
  --shadow: 0 2px 12px rgba(26,24,20,0.08);
  --shadow-lg: 0 8px 32px rgba(26,24,20,0.12);
  --r: 12px;
  --r-sm: 8px;
  --font: 'Noto Sans JP', sans-serif;
  --mono: 'DM Mono', monospace;
}

html { font-family: var(--font); background: var(--bg); color: var(--ink); min-height: 100vh; }
body { min-height: 100vh; }

/* ── Layout ── */
.layout { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; max-width: 520px; margin: 0 auto; padding: 0 16px 40px; }

/* ── Header ── */
.header { padding: 24px 0 20px; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--accent); display: grid; place-items: center;
}
.logo-mark svg { width: 20px; height: 20px; fill: #fff; }
.logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.logo-sub { font-size: 11px; color: var(--ink3); font-family: var(--mono); letter-spacing: 0.05em; }
.api-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 20px; padding: 5px 10px 5px 6px; cursor: pointer;
  font-size: 12px; color: var(--ink2); transition: all 0.15s;
}
.api-pill:hover { border-color: var(--accent); color: var(--accent); }
.api-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ink3); flex-shrink: 0; }
.api-dot.connected { background: var(--green); }

/* ── Steps ── */
.step-bar { display: flex; gap: 0; margin-bottom: 20px; }
.step {
  flex: 1; display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-family: var(--mono); color: var(--ink3);
  padding: 8px 0; border-bottom: 2px solid var(--border);
  transition: all 0.3s; position: relative;
}
.step.active { color: var(--accent); border-bottom-color: var(--accent); }
.step.done { color: var(--green); border-bottom-color: var(--green); }
.step-num {
  width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid currentColor;
  display: grid; place-items: center; font-size: 10px; flex-shrink: 0;
}
.step.done .step-num { background: var(--green); color: #fff; border-color: var(--green); }
.step-num::after { content: attr(data-n); }
.step.done .step-num::after { content: '✓'; font-size: 9px; }

/* ── Upload ── */
.upload-zone {
  border: 2px dashed var(--border2); border-radius: var(--r);
  padding: 40px 20px; text-align: center; cursor: pointer;
  background: var(--surface); transition: all 0.2s; position: relative;
  overflow: hidden;
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #FFF5F1; }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0; }
.upload-icon-wrap {
  width: 56px; height: 56px; border-radius: 16px; background: var(--surface2);
  display: grid; place-items: center; margin: 0 auto 14px;
}
.upload-icon-wrap svg { width: 28px; height: 28px; stroke: var(--ink2); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.upload-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.upload-sub { font-size: 13px; color: var(--ink3); }
.upload-hint { font-size: 11px; color: var(--ink3); margin-top: 12px; font-family: var(--mono); }

/* ── Canvas ── */
.canvas-section { display: none; }
.canvas-section.visible { display: block; }
.canvas-card {
  background: var(--surface); border-radius: var(--r);
  overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow);
  position: relative;
}
#mainCanvas { display: block; width: 100%; cursor: crosshair; touch-action: none; }
#overlayCanvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }

/* ── Toolbar ── */
.toolbar { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
.tool-row { display: flex; gap: 8px; }
.tool-btn {
  flex: 1; padding: 9px 8px; border-radius: var(--r-sm);
  border: 1px solid var(--border2); background: var(--surface);
  font-size: 13px; font-family: var(--font); cursor: pointer;
  color: var(--ink); display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.15s; font-weight: 500;
}
.tool-btn:hover { background: var(--surface2); }
.tool-btn:active { transform: scale(0.97); }
.tool-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.tool-btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.tool-btn.accent:hover { background: #d33d09; }
.tool-btn.ghost { color: var(--ink2); }
.tool-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

.brush-row { display: flex; align-items: center; gap: 10px; padding: 2px 0; }
.brush-label { font-size: 12px; color: var(--ink2); white-space: nowrap; font-family: var(--mono); min-width: 56px; }
input[type=range] { flex: 1; accent-color: var(--accent); height: 4px; }
.brush-val { font-size: 12px; font-family: var(--mono); color: var(--ink); min-width: 36px; text-align: right; }

/* ── Answer toggle ── */
.answer-toggle {
  background: var(--surface); border: 1px solid var(--border2); border-radius: var(--r);
  overflow: hidden; margin-top: 12px;
}
.answer-toggle-header {
  padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.answer-toggle-header:hover { background: var(--surface2); }
.answer-label { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.answer-label-badge {
  font-size: 10px; font-family: var(--mono); padding: 2px 7px;
  border-radius: 20px; background: var(--green-bg); color: var(--green); font-weight: 500;
}
.answer-label-badge.loading-badge { background: #FFF5F1; color: var(--accent); }
.toggle-icon { transition: transform 0.3s; color: var(--ink3); }
.toggle-icon.open { transform: rotate(180deg); }
.answer-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
.answer-body.visible { display: block; }
.answer-text {
  font-size: 14px; line-height: 1.85; color: var(--ink); white-space: pre-wrap;
  padding-top: 14px;
}
.loading-anim { display: flex; gap: 5px; align-items: center; padding-top: 14px; }
.loading-anim span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s infinite; }
.loading-anim span:nth-child(2) { animation-delay: 0.2s; }
.loading-anim span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,60%,100%{opacity:0.3;transform:scale(0.8)} 30%{opacity:1;transform:scale(1)} }

/* ── API Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(26,24,20,0.5);
  display: grid; place-items: center; z-index: 100; display: none;
  padding: 20px;
}
.modal-overlay.open { display: grid; }
.modal {
  background: var(--surface); border-radius: var(--r); padding: 24px;
  width: 100%; max-width: 400px; box-shadow: var(--shadow-lg);
}
.modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.modal p { font-size: 13px; color: var(--ink2); margin-bottom: 16px; line-height: 1.6; }
.modal input {
  width: 100%; padding: 10px 12px; border-radius: var(--r-sm);
  border: 1px solid var(--border2); background: var(--bg);
  font-size: 13px; font-family: var(--mono); color: var(--ink);
  margin-bottom: 10px; outline: none;
}
.modal input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; }
.modal-btn {
  flex: 1; padding: 10px; border-radius: var(--r-sm);
  border: 1px solid var(--border2); font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: var(--font); transition: all 0.15s;
}
.modal-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.modal-btn.primary:hover { background: #d33d09; }
.modal-btn.secondary { background: var(--surface2); color: var(--ink); }
.modal-btn.secondary:hover { background: var(--border); }

/* ── Solve button ── */
.solve-btn {
  width: 100%; padding: 14px; border-radius: var(--r);
  background: var(--accent); color: #fff; border: none;
  font-size: 15px; font-weight: 700; font-family: var(--font);
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s; margin-top: 12px;
  box-shadow: 0 4px 16px rgba(232,68,10,0.3);
}
.solve-btn:hover { background: #d33d09; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,68,10,0.35); }
.solve-btn:active { transform: translateY(0); }
.solve-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.solve-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── Hint ── */
.hint {
  font-size: 12px; color: var(--ink3); text-align: center;
  font-family: var(--mono); padding: 8px 0;
}

/* ── fade in ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation: fadeUp 0.35s ease forwards; }
</style>
</head>
<body>
<div class="layout">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7z"/></svg>
      </div>
      <div>
        <div class="logo-text">宿題スキャナー</div>
        <div class="logo-sub">HOMEWORK SCANNER</div>
      </div>
    </div>
    <div class="api-pill" id="apiPill" onclick="openModal()">
      <div class="api-dot" id="apiDot"></div>
      <span id="apiPillText">APIキー設定</span>
    </div>
  </div>

  <div>
    <!-- Steps -->
    <div class="step-bar" id="stepBar">
      <div class="step active" id="step1"><div class="step-num" data-n="1"></div><span>撮影</span></div>
      <div class="step" id="step2"><div class="step-num" data-n="2"></div><span>消去</span></div>
      <div class="step" id="step3"><div class="step-num" data-n="3"></div><span>解答</span></div>
    </div>

    <!-- Upload zone -->
    <div class="upload-zone" id="uploadZone">
      <input type="file" accept="image/*" id="fileInput" capture="environment" />
      <div class="upload-icon-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      </div>
      <div class="upload-title">写真を撮影 / 選択</div>
      <div class="upload-sub">宿題・プリント・テストなど</div>
      <div class="upload-hint">JPEG · PNG · HEIC 対応</div>
    </div>

    <!-- Canvas section -->
    <div class="canvas-section" id="canvasSection">
      <div class="canvas-card">
        <canvas id="mainCanvas"></canvas>
        <canvas id="overlayCanvas"></canvas>
      </div>

      <div class="toolbar">
        <!-- Mode -->
        <div class="tool-row">
          <button class="tool-btn active" id="btnErase" onclick="setMode('erase')">
            <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l13-13 7 7-3 3z"/><path d="M6 17l4-4"/></svg>
            消しゴム
          </button>
          <button class="tool-btn" id="btnRestore" onclick="setMode('restore')">
            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            元に戻す
          </button>
          <button class="tool-btn ghost" id="btnUndo" onclick="undo()">
            <svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a6 6 0 0 1 0 12H10"/></svg>
            Undo
          </button>
          <button class="tool-btn ghost" id="btnReset" onclick="resetImage()">
            <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6l-1 14H6L5 6M8 6V4h8v2"/></svg>
          </button>
        </div>

        <!-- Brush -->
        <div class="brush-row">
          <span class="brush-label">ブラシ</span>
          <input type="range" id="brushRange" min="8" max="80" value="22" step="1" oninput="updateBrush(this.value)" />
          <span class="brush-val" id="brushVal">22px</span>
        </div>
      </div>

      <!-- Solve button -->
      <button class="solve-btn" id="solveBtn" onclick="solveHomework()">
        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 8v4l3 3"/><path d="M18 2v6h6"/></svg>
        AIに解いてもらう
      </button>

      <!-- Answer toggle -->
      <div class="answer-toggle" id="answerToggle" style="display:none;">
        <div class="answer-toggle-header" onclick="toggleAnswer()">
          <div class="answer-label">
            AIの解答
            <span class="answer-label-badge" id="answerBadge">完了</span>
          </div>
          <svg class="toggle-icon" id="toggleIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="answer-body" id="answerBody">
          <div class="answer-text" id="answerText"></div>
        </div>
      </div>

      <!-- Change image -->
      <div class="hint" style="margin-top: 14px;">
        <label for="fileInput2" style="cursor:pointer;color:var(--accent);">別の写真を選ぶ ↑</label>
        <input type="file" accept="image/*" id="fileInput2" capture="environment" style="display:none;" onchange="loadFile(this)" />
      </div>
    </div>
  </div>
</div>

<!-- API Key Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal fade-up">
    <h2>Anthropic APIキー</h2>
    <p>Claude Vision APIを使って問題を解くためにAPIキーが必要です。キーは端末内にのみ保存されます。</p>
    <input type="password" id="apiInput" placeholder="sk-ant-..." autocomplete="off" />
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">キャンセル</button>
      <button class="modal-btn primary" onclick="saveApiKey()">保存</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let apiKey = localStorage.getItem('hw_api_key') || '';
let originalImage = null;
let mode = 'erase';
let drawing = false;
let brushSize = 22;
let history = [];
let answerVisible = false;
let hasAnswer = false;

const mainCanvas = document.getElementById('mainCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const mainCtx = mainCanvas.getContext('2d');
const overlayCtx = overlayCanvas.getContext('2d');

// ── Init ──
updateApiPill();

document.getElementById('fileInput').addEventListener('change', e => loadFile(e.target));
['dragover','dragenter'].forEach(ev => {
  document.getElementById('uploadZone').addEventListener(ev, e => { e.preventDefault(); document.getElementById('uploadZone').classList.add('drag'); });
});
['dragleave','drop'].forEach(ev => {
  document.getElementById('uploadZone').addEventListener(ev, e => { e.preventDefault(); document.getElementById('uploadZone').classList.remove('drag'); });
});
document.getElementById('uploadZone').addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f) { const dt = new DataTransfer(); dt.items.add(f); document.getElementById('fileInput').files = dt.files; loadFile(document.getElementById('fileInput')); }
});

function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      const maxW = Math.min(480, window.innerWidth - 32);
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      mainCanvas.width = w; mainCanvas.height = h;
      overlayCanvas.width = w; overlayCanvas.height = h;
      mainCtx.drawImage(img, 0, 0, w, h);
      history = [mainCtx.getImageData(0, 0, w, h)];
      document.getElementById('uploadZone').style.display = 'none';
      document.getElementById('canvasSection').classList.add('visible');
      document.getElementById('answerToggle').style.display = 'none';
      document.getElementById('answerBody').classList.remove('visible');
      hasAnswer = false;
      setStep(2);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Mode ──
function setMode(m) {
  mode = m;
  document.getElementById('btnErase').classList.toggle('active', m === 'erase');
  document.getElementById('btnRestore').classList.toggle('active', m === 'restore');
}

function updateBrush(v) {
  brushSize = parseInt(v);
  document.getElementById('brushVal').textContent = brushSize + 'px';
}

// ── Draw ──
function getPos(e) {
  const rect = overlayCanvas.getBoundingClientRect();
  const sx = overlayCanvas.width / rect.width;
  const sy = overlayCanvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) * sx, y: (src.clientY - rect.top) * sy };
}

function paint(x, y) {
  const r = brushSize / 2;
  const sx = Math.max(0, Math.floor(x - r));
  const sy = Math.max(0, Math.floor(y - r));
  const sw = Math.min(mainCanvas.width, Math.ceil(x + r)) - sx;
  const sh = Math.min(mainCanvas.height, Math.ceil(y + r)) - sy;
  if (sw <= 0 || sh <= 0) return;

  const cur = mainCtx.getImageData(sx, sy, sw, sh);

  if (mode === 'erase') {
    for (let py = 0; py < sh; py++) {
      for (let px = 0; px < sw; px++) {
        if ((px+sx-x)**2 + (py+sy-y)**2 <= r*r) {
          const i = (py*sw+px)*4;
          cur.data[i]=255; cur.data[i+1]=255; cur.data[i+2]=255; cur.data[i+3]=255;
        }
      }
    }
  } else {
    const tmp = document.createElement('canvas');
    tmp.width = mainCanvas.width; tmp.height = mainCanvas.height;
    const tCtx = tmp.getContext('2d');
    tCtx.drawImage(originalImage, 0, 0, mainCanvas.width, mainCanvas.height);
    const orig = tCtx.getImageData(sx, sy, sw, sh);
    for (let py = 0; py < sh; py++) {
      for (let px = 0; px < sw; px++) {
        if ((px+sx-x)**2 + (py+sy-y)**2 <= r*r) {
          const i = (py*sw+px)*4;
          cur.data[i]=orig.data[i]; cur.data[i+1]=orig.data[i+1]; cur.data[i+2]=orig.data[i+2]; cur.data[i+3]=orig.data[i+3];
        }
      }
    }
  }
  mainCtx.putImageData(cur, sx, sy);

  // cursor overlay
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  overlayCtx.beginPath();
  overlayCtx.arc(x, y, r, 0, Math.PI*2);
  overlayCtx.strokeStyle = mode === 'erase' ? 'rgba(232,68,10,0.7)' : 'rgba(42,122,75,0.7)';
  overlayCtx.lineWidth = 2;
  overlayCtx.stroke();
}

overlayCanvas.addEventListener('mousedown', e => { drawing=true; const p=getPos(e); saveSnap(); paint(p.x,p.y); });
overlayCanvas.addEventListener('mousemove', e => { if(drawing){const p=getPos(e);paint(p.x,p.y);} else { const p=getPos(e); overlayCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height); overlayCtx.beginPath(); overlayCtx.arc(p.x,p.y,brushSize/2,0,Math.PI*2); overlayCtx.strokeStyle=mode==='erase'?'rgba(232,68,10,0.5)':'rgba(42,122,75,0.5)'; overlayCtx.lineWidth=1.5; overlayCtx.stroke(); } });
overlayCanvas.addEventListener('mouseup', () => { drawing=false; });
overlayCanvas.addEventListener('mouseleave', () => { drawing=false; overlayCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height); });
overlayCanvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; saveSnap(); const p=getPos(e); paint(p.x,p.y); }, {passive:false});
overlayCanvas.addEventListener('touchmove', e => { e.preventDefault(); if(drawing){const p=getPos(e);paint(p.x,p.y);} }, {passive:false});
overlayCanvas.addEventListener('touchend', () => { drawing=false; });

function saveSnap() {
  if (history.length > 30) history.shift();
  history.push(mainCtx.getImageData(0, 0, mainCanvas.width, mainCanvas.height));
}

function undo() {
  if (history.length > 1) { history.pop(); mainCtx.putImageData(history[history.length-1], 0, 0); }
}

function resetImage() {
  if (!originalImage) return;
  mainCtx.drawImage(originalImage, 0, 0, mainCanvas.width, mainCanvas.height);
  history = [mainCtx.getImageData(0, 0, mainCanvas.width, mainCanvas.height)];
  document.getElementById('answerToggle').style.display = 'none';
  hasAnswer = false;
  setStep(2);
}

// ── AI Solve ──
async function solveHomework() {
  if (!apiKey) { openModal(); return; }
  const btn = document.getElementById('solveBtn');
  btn.disabled = true;
  btn.textContent = '解析中...';

  const toggle = document.getElementById('answerToggle');
  const badge = document.getElementById('answerBadge');
  const body = document.getElementById('answerBody');
  const text = document.getElementById('answerText');

  toggle.style.display = 'block';
  badge.textContent = '解析中';
  badge.className = 'answer-label-badge loading-badge';
  body.classList.add('visible');
  text.innerHTML = '<div class="loading-anim"><span></span><span></span><span></span></div>';
  answerVisible = true;
  document.getElementById('toggleIcon').classList.add('open');
  setStep(3);

  try {
    const imageData = mainCanvas.toDataURL('image/jpeg', 0.88).split(',')[1];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageData } },
            { type: 'text', text: '以下の宿題・問題プリントの画像を見て、すべての問題に対して答えと解説を日本語で教えてください。手書きの答えは消されている場合があります。問題ごとに番号を付けて回答してください。' }
          ]
        }]
      })
    });
    const data = await res.json();
    if (data.content?.[0]?.text) {
      text.textContent = data.content[0].text;
      badge.textContent = '完了';
      badge.className = 'answer-label-badge';
      hasAnswer = true;
    } else {
      text.textContent = 'エラー: ' + JSON.stringify(data.error || '不明なエラー');
      badge.textContent = 'エラー';
      badge.className = 'answer-label-badge loading-badge';
    }
  } catch(e) {
    text.textContent = 'エラー: ' + e.message;
    badge.textContent = 'エラー';
    badge.className = 'answer-label-badge loading-badge';
  }

  btn.disabled = false;
  btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 8v4l3 3"/><path d="M18 2v6h6"/></svg> もう一度解いてもらう';
}

function toggleAnswer() {
  answerVisible = !answerVisible;
  document.getElementById('answerBody').classList.toggle('visible', answerVisible);
  document.getElementById('toggleIcon').classList.toggle('open', answerVisible);
}

// ── Steps ──
function setStep(n) {
  [1,2,3].forEach(i => {
    const s = document.getElementById('step'+i);
    s.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
  });
}

// ── API Modal ──
function openModal() {
  document.getElementById('apiInput').value = apiKey;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('apiInput').focus(), 100);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function saveApiKey() {
  const v = document.getElementById('apiInput').value.trim();
  if (!v) return;
  apiKey = v;
  localStorage.setItem('hw_api_key', v);
  updateApiPill();
  closeModal();
}
function updateApiPill() {
  const dot = document.getElementById('apiDot');
  const txt = document.getElementById('apiPillText');
  if (apiKey) { dot.className='api-dot connected'; txt.textContent='API 接続済み'; }
  else { dot.className='api-dot'; txt.textContent='APIキー設定'; }
}

document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===document.getElementById('modalOverlay')) closeModal(); });
document.getElementById('apiInput').addEventListener('keydown', e => { if(e.key==='Enter') saveApiKey(); });
</script>
</body>
</html>
